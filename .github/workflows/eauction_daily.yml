name: E-Auction Daily Parser

on:
  schedule:
    # Зеркальное расписание стартов (UTC, шаг 45 мин, утреннее окно — вне зоны
    # перегрузки GitHub Actions ~22:00-02:00 UTC, где задержки доходят до часов):
    #   Пн 06:07  Вт 06:52  Ср 07:37  Чт 08:22 (пик)  Пт 07:37  Сб 06:52  Вс 06:07
    - cron: '7 6 * * 1'     # Понедельник 06:07 UTC (09:07 Минск)
    - cron: '52 6 * * 2'    # Вторник     06:52 UTC (09:52 Минск)
    - cron: '37 7 * * 3'    # Среда       07:37 UTC (10:37 Минск)
    - cron: '22 8 * * 4'    # Четверг     08:22 UTC (11:22 Минск)
    - cron: '37 7 * * 5'    # Пятница     07:37 UTC (10:37 Минск)
    - cron: '52 6 * * 6'    # Суббота     06:52 UTC (09:52 Минск)
    - cron: '7 6 * * 0'     # Воскресенье 06:07 UTC (09:07 Минск)
  workflow_dispatch:       # ручной запуск — задержка пропускается автоматически

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run parser
        env:
          EAUCTION_WORKER_URL: ${{ secrets.EAUCTION_WORKER_URL }}
          WORKER_URL:          ${{ secrets.WORKER_URL }}
          PARSER_SECRET:       ${{ secrets.PARSER_SECRET }}
          SKIP_RANDOM_DELAY:   ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        working-directory: parser
        run: python eauction_daily.py
