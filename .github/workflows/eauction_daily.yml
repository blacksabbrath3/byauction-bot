name: E-Auction Daily Parser

on:
  schedule:
    # Зеркальное расписание стартов (время Минска UTC+3, шаг 45 мин):
    #   Пн 01:07  Вт 01:52  Ср 02:37  Чт 03:22 (пик)  Пт 02:37  Сб 01:52  Вс 01:07
    - cron: '7 22 * * 0'    # Понедельник 01:07 Минск
    - cron: '52 22 * * 1'   # Вторник     01:52 Минск
    - cron: '37 23 * * 2'   # Среда       02:37 Минск
    - cron: '22 0 * * 4'    # Четверг     03:22 Минск
    - cron: '37 23 * * 4'   # Пятница     02:37 Минск
    - cron: '52 22 * * 5'   # Суббота     01:52 Минск
    - cron: '7 22 * * 6'    # Воскресенье 01:07 Минск
  workflow_dispatch:       # ручной запуск — задержка пропускается автоматически

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run parser
        env:
          EAUCTION_WORKER_URL: ${{ secrets.EAUCTION_WORKER_URL }}
          WORKER_URL:          ${{ secrets.WORKER_URL }}
          PARSER_SECRET:       ${{ secrets.PARSER_SECRET }}
          SKIP_RANDOM_DELAY:   ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        working-directory: parser
        run: python eauction_daily.py
