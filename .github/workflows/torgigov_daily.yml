name: Torgigov Daily Parser

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC (05:00 Минск)
  workflow_dispatch:       # ручной запуск — задержка пропускается

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 часов — запас для задержки + парсинга

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run parser
        env:
          TORGIGOV_WORKER_URL: ${{ secrets.TORGIGOV_WORKER_URL }}
          PARSER_SECRET:       ${{ secrets.PARSER_SECRET }}
          SKIP_RANDOM_DELAY:   ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        working-directory: parser
        run: python torgigov_daily.py
