name: Torgigov Daily Parser

on:
  schedule:
    # Зеркальное расписание стартов (UTC, шаг 45 мин, утреннее окно — вне зоны
    # перегрузки GitHub Actions ~22:00-02:00 UTC, +5 мин от eauction):
    #   Пн 06:12  Вт 06:57  Ср 07:42  Чт 08:27 (пик)  Пт 07:42  Сб 06:57  Вс 06:12
    - cron: '12 6 * * 1'    # Понедельник 06:12 UTC (09:12 Минск)
    - cron: '57 6 * * 2'    # Вторник     06:57 UTC (09:57 Минск)
    - cron: '42 7 * * 3'    # Среда       07:42 UTC (10:42 Минск)
    - cron: '27 8 * * 4'    # Четверг     08:27 UTC (11:27 Минск)
    - cron: '42 7 * * 5'    # Пятница     07:42 UTC (10:42 Минск)
    - cron: '57 6 * * 6'    # Суббота     06:57 UTC (09:57 Минск)
    - cron: '12 6 * * 0'    # Воскресенье 06:12 UTC (09:12 Минск)
  workflow_dispatch:       # ручной запуск — задержка пропускается

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4
        # proxy_pool.py uses: requests, re, json, ipaddress (все stdlib кроме requests)

      - name: Run parser
        env:
          TORGIGOV_WORKER_URL: ${{ secrets.TORGIGOV_WORKER_URL }}
          PARSER_SECRET:       ${{ secrets.PARSER_SECRET }}
          SKIP_RANDOM_DELAY:   ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          BOT_TOKEN:           ${{ secrets.BOT_TOKEN }}
          ALERT_TELEGRAM_CHAT_ID: ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          ALERT_EMAIL:         ${{ secrets.ALERT_EMAIL }}
          ALERT_SMTP_HOST:     ${{ secrets.ALERT_SMTP_HOST }}
          ALERT_SMTP_PORT:     ${{ secrets.ALERT_SMTP_PORT }}
          ALERT_SMTP_USER:     ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASS:     ${{ secrets.ALERT_SMTP_PASS }}
        working-directory: parser
        run: python torgigov_daily.py
