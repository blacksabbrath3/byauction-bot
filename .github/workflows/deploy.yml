      - name: Deploy rechitsa-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: for_cloudflare_workers/workers/rechitsa

  deploy-torgigov:
