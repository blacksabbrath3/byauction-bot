name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'for_cloudflare_workers/**'

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: for_cloudflare_workers
      - name: Set KV namespace IDs
        run: |
          sed -i "s/REPLACE_WITH_SUBSCRIBERS_KV_ID/${{ secrets.KV_SUBSCRIBERS_ID }}/g" \
            for_cloudflare_workers/workers/bot/wrangler.toml
      - name: Deploy bot-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: for_cloudflare_workers/workers/bot
      - name: Register Telegram webhook
        run: |
          if [ -z "${{ secrets.CF_ACCOUNT_SUBDOMAIN }}" ]; then
            echo "::warning::CF_ACCOUNT_SUBDOMAIN secret is not set — skipping webhook registration. Set it in repo Settings → Secrets → Actions."
            exit 0
          fi
          sleep 5
          curl -sf "https://bot-worker.${{ secrets.CF_ACCOUNT_SUBDOMAIN }}.workers.dev/set-webhook"
        continue-on-error: true

  deploy-eauction:
    runs-on: ubuntu-latest
