          sed -i "s/REPLACE_WITH_SUBSCRIBERS_KV_ID/${{ secrets.KV_SUBSCRIBERS_ID }}/g" \
            for_cloudflare_workers/workers/eauction/wrangler.toml
      - name: Deploy eauction-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: for_cloudflare_workers/workers/eauction

