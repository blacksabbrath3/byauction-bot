name: butb_daily

on:
  schedule:
    # 02:00 UTC = 05:00 Минск (UTC+3)
    # Парсер спит случайное время внутри скрипта (до 4 часов),
    # уведомления уходят в 06:00 UTC = 09:00 Минск
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      skip_delay:
        description: "Пропустить рандомную задержку"
        required: false
        default: "true"

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 часов (ждём до NOTIFY_TIME_UTC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run butb_daily
        env:
          BUTB_WORKER_URL:         ${{ secrets.BUTB_WORKER_URL }}
          PARSER_SECRET:           ${{ secrets.PARSER_SECRET }}
          BOT_TOKEN:               ${{ secrets.BOT_TOKEN }}
          ALERT_EMAIL:             ${{ secrets.ALERT_EMAIL }}
          ALERT_SMTP_HOST:         ${{ secrets.ALERT_SMTP_HOST }}
          ALERT_SMTP_PORT:         ${{ secrets.ALERT_SMTP_PORT }}
          ALERT_SMTP_USER:         ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASS:         ${{ secrets.ALERT_SMTP_PASS }}
          ALERT_TELEGRAM_CHAT_ID:  ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          SKIP_RANDOM_DELAY:       ${{ github.event.inputs.skip_delay || 'false' }}
        run: |
          cd parser
          python butb_daily.py
