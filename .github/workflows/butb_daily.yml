name: butb_daily

on:
  schedule:
    # Зеркальное расписание стартов (время Минска UTC+3, шаг 45 мин, +10 мин от eauction):
    #   Пн 01:17  Вт 02:02  Ср 02:47  Чт 03:32 (пик)  Пт 02:47  Сб 02:02  Вс 01:17
    # Уведомления отправляются сразу по завершении парсинга — без долгого ожидания.
    - cron: "17 22 * * 0"   # Понедельник 01:17 Минск
    - cron: "2 23 * * 1"    # Вторник     02:02 Минск
    - cron: "47 23 * * 2"   # Среда       02:47 Минск
    - cron: "32 0 * * 4"    # Четверг     03:32 Минск
    - cron: "47 23 * * 4"   # Пятница     02:47 Минск
    - cron: "2 23 * * 5"    # Суббота     02:02 Минск
    - cron: "17 22 * * 6"   # Воскресенье 01:17 Минск
  workflow_dispatch:
    inputs:
      skip_delay:
        description: "Пропустить рандомную задержку"
        required: false
        default: "true"

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run butb_daily
        env:
          BUTB_WORKER_URL:         ${{ secrets.BUTB_WORKER_URL }}
          PARSER_SECRET:           ${{ secrets.PARSER_SECRET }}
          BOT_TOKEN:               ${{ secrets.BOT_TOKEN }}
          ALERT_EMAIL:             ${{ secrets.ALERT_EMAIL }}
          ALERT_SMTP_HOST:         ${{ secrets.ALERT_SMTP_HOST }}
          ALERT_SMTP_PORT:         ${{ secrets.ALERT_SMTP_PORT }}
          ALERT_SMTP_USER:         ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASS:         ${{ secrets.ALERT_SMTP_PASS }}
          ALERT_TELEGRAM_CHAT_ID:  ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          SKIP_RANDOM_DELAY:       ${{ github.event.inputs.skip_delay || 'false' }}
        run: |
          cd parser
          python butb_daily.py
