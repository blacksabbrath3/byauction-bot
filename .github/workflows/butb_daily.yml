name: butb_daily

on:
  schedule:
    # Зеркальное расписание стартов (UTC, шаг 45 мин, утреннее окно — вне зоны
    # перегрузки GitHub Actions ~22:00-02:00 UTC, +10 мин от eauction):
    #   Пн 06:17  Вт 07:02  Ср 07:47  Чт 08:32 (пик)  Пт 07:47  Сб 07:02  Вс 06:17
    - cron: "17 6 * * 1"    # Понедельник 06:17 UTC (09:17 Минск)
    - cron: "2 7 * * 2"     # Вторник     07:02 UTC (10:02 Минск)
    - cron: "47 7 * * 3"    # Среда       07:47 UTC (10:47 Минск)
    - cron: "32 8 * * 4"    # Четверг     08:32 UTC (11:32 Минск)
    - cron: "47 7 * * 5"    # Пятница     07:47 UTC (10:47 Минск)
    - cron: "2 7 * * 6"     # Суббота     07:02 UTC (10:02 Минск)
    - cron: "17 6 * * 0"    # Воскресенье 06:17 UTC (09:17 Минск)
  workflow_dispatch:
    inputs:
      skip_delay:
        description: "Пропустить рандомную задержку"
        required: false
        default: "true"

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run butb_daily
        env:
          BUTB_WORKER_URL:         ${{ secrets.BUTB_WORKER_URL }}
          PARSER_SECRET:           ${{ secrets.PARSER_SECRET }}
          BOT_TOKEN:               ${{ secrets.BOT_TOKEN }}
          ALERT_EMAIL:             ${{ secrets.ALERT_EMAIL }}
          ALERT_SMTP_HOST:         ${{ secrets.ALERT_SMTP_HOST }}
          ALERT_SMTP_PORT:         ${{ secrets.ALERT_SMTP_PORT }}
          ALERT_SMTP_USER:         ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASS:         ${{ secrets.ALERT_SMTP_PASS }}
          ALERT_TELEGRAM_CHAT_ID:  ${{ secrets.ALERT_TELEGRAM_CHAT_ID }}
          SKIP_RANDOM_DELAY:       ${{ github.event.inputs.skip_delay || 'false' }}
        run: |
          cd parser
          python butb_daily.py
