name: Rechitsa Daily Parser

on:
  schedule:
    # Зеркальное расписание стартов (время Минска UTC+3, шаг 45 мин, +15 мин от eauction):
    #   Пн 01:22  Вт 02:07  Ср 02:52  Чт 03:37 (пик)  Пт 02:52  Сб 02:07  Вс 01:22
    - cron: '22 22 * * 0'   # Понедельник 01:22 Минск
    - cron: '7 23 * * 1'    # Вторник     02:07 Минск
    - cron: '52 23 * * 2'   # Среда       02:52 Минск
    - cron: '37 0 * * 4'    # Четверг     03:37 Минск
    - cron: '52 23 * * 4'   # Пятница     02:52 Минск
    - cron: '7 23 * * 5'    # Суббота     02:07 Минск
    - cron: '22 22 * * 6'   # Воскресенье 01:22 Минск
  workflow_dispatch:       # ручной запуск — задержка пропускается автоматически

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run parser
        env:
          RECHITSA_WORKER_URL: ${{ secrets.RECHITSA_WORKER_URL }}
          PARSER_SECRET:       ${{ secrets.PARSER_SECRET }}
          SKIP_RANDOM_DELAY:   ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          cd parser
          python rechitsa_daily.py
