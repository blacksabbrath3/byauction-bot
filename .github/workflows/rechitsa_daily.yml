name: Rechitsa Daily Parser

on:
  schedule:
    # Зеркальное расписание стартов (UTC, шаг 45 мин, утреннее окно — вне зоны
    # перегрузки GitHub Actions ~22:00-02:00 UTC, +15 мин от eauction):
    #   Пн 06:22  Вт 07:07  Ср 07:52  Чт 08:37 (пик)  Пт 07:52  Сб 07:07  Вс 06:22
    - cron: '22 6 * * 1'    # Понедельник 06:22 UTC (09:22 Минск)
    - cron: '7 7 * * 2'     # Вторник     07:07 UTC (10:07 Минск)
    - cron: '52 7 * * 3'    # Среда       07:52 UTC (10:52 Минск)
    - cron: '37 8 * * 4'    # Четверг     08:37 UTC (11:37 Минск)
    - cron: '52 7 * * 5'    # Пятница     07:52 UTC (10:52 Минск)
    - cron: '7 7 * * 6'     # Суббота     07:07 UTC (10:07 Минск)
    - cron: '22 6 * * 0'    # Воскресенье 06:22 UTC (09:22 Минск)
  workflow_dispatch:       # ручной запуск — задержка пропускается автоматически

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # уведомления отправляются сразу, долгое ожидание не нужно

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run parser
        env:
          RECHITSA_WORKER_URL: ${{ secrets.RECHITSA_WORKER_URL }}
          PARSER_SECRET:       ${{ secrets.PARSER_SECRET }}
          SKIP_RANDOM_DELAY:   ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          cd parser
          python rechitsa_daily.py
