name = "torgigov-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "TORGIGOV_STORAGE"
id = "YOUR_TORGIGOV_STORAGE_KV_ID"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "YOUR_BOT_SUBSCRIBERS_KV_ID"

# Secrets (set via wrangler secret put или Cloudflare Dashboard):
# BOT_TOKEN
# PARSER_SECRET
