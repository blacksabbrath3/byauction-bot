name = "butb-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "BUTB_STORAGE"
id = "REPLACE_WITH_YOUR_KV_ID"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "REPLACE_WITH_SUBSCRIBERS_KV_ID"

# Secrets (set via: wrangler secret put BOT_TOKEN, wrangler secret put PARSER_SECRET):
# BOT_TOKEN
# PARSER_SECRET
